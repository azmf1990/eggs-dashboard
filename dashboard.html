<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 EGGS AND EGGS — داشبورد Foodics</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5A623; --gold-light: #FFD07A; --dark: #0D0D0D; --dark2: #1A1A1A;
    --dark3: #252525; --text: #F0EDE8; --text-dim: #9A9490;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, #2a1f00 0%, #0D0D0D 70%);
  }
  .login-box {
    background: var(--dark2); border: 1px solid #333; border-radius: 20px;
    padding: 48px 40px; width: 100%; max-width: 440px; text-align: center;
    box-shadow: 0 0 60px rgba(245,166,35,0.08);
  }
  .login-logo { font-size: 48px; margin-bottom: 8px; }
  .login-title { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 4px; }
  .login-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 36px; }
  .field-label { text-align: right; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
  .token-input {
    width: 100%; background: var(--dark3); border: 1px solid #3a3a3a; border-radius: 12px;
    padding: 14px 16px; color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 13px; outline: none; resize: vertical; text-align: right;
  }
  .token-input:focus { border-color: var(--gold); }
  .btn-login {
    width: 100%; margin-top: 24px; background: var(--gold); color: #000;
    font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700;
    border: none; border-radius: 12px; padding: 15px; cursor: pointer;
  }
  .btn-login:hover { background: var(--gold-light); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    background: rgba(229,57,53,0.12); border: 1px solid rgba(229,57,53,0.3);
    border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #ff6b6b;
    margin-top: 16px; display: none;
  }
  .secure-note {
    background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.2);
    border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #81C784; margin-top: 16px;
  }
