<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 EGGS AND EGGS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--g:#F5A623;--d:#0D0D0D;--d2:#1A1A1A;--d3:#252525;--t:#F0EDE8;--td:#9A9490}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--d);color:var(--t);min-height:100vh}
#L{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#2a1f00,#0D0D0D 70%)}
.box{background:var(--d2);border:1px solid #333;border-radius:20px;padding:40px;width:100%;max-width:420px;text-align:center}
.ti{font-size:24px;font-weight:900;color:var(--g);margin-bottom:4px}
.su{font-size:13px;color:var(--td);margin-bottom:28px}
textarea{width:100%;background:var(--d3);border:1px solid #3a3a3a;border-radius:10px;padding:12px;color:var(--t);font-family:inherit;font-size:13px;outline:none;resize:vertical;text-align:right}
textarea:focus{border-color:var(--g)}
.btn{width:100%;margin-top:16px;background:var(--g);color:#000;font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:10px;padding:14px;cursor:pointer}
.err{background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.3);border-radius:8px;padding:10px;font-size:13px;color:#ff6b6b;margin-top:12px;display:none}
#D{display:none}
.top{background:var(--d2);border-bottom:1px solid #222;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.tl{font-size:18px;font-weight:900;color:var(--g)}
.sm{background:transparent;border:1px solid #333;color:var(--td);font-family:inherit;font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer}
.main{padding:20px;max-width:1000px;margin:0 auto}
.db{background:var(--d2);border:1px solid #222;border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
.qb{background:var(--d3);border:1px solid #333;color:var(--td);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer}
.qb.a{background:rgba(245,166,35,.1);border-color:var(--g);color:var(--g)}
input[type=date]{background:var(--d3);border:1px solid #333;border-radius:6px;padding:7px 10px;color:var(--t);font-family:inherit;font-size:12px;outline:none}
.gb{background:var(--g);color:#000;font-family:inherit;font-size:12px;font-weight:700;border:none;border-radius:6px;padding:7px 16px;cursor:pointer}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--d2);border:1px solid #222;border-radius:12px;padding:16px;position:relative}
.kl{font-size:11px;color:var(--td);margin-bottom:8px}
.kv{font-size:22px;font-weight:900;color:var(--g);line-height:1}
.ks{font-size:11px;color:var(--td);margin-top:4px}
.ki{position:absolute;top:12px;left:12px;font-size:18px;opacity:.3}
.ld{text-align:center;padding:50px;color:var(--td)}
.sp{width:32px;height:32px;border:3px solid #222;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.tw{background:var(--d2);border:1px solid #222;border-radius:12px;overflow:hidden;margin-bottom:18px}
table{width:100%;border-collapse:collapse}
th{background:var(--d3);padding:10px 14px;font-size:11px;font-weight:700;color:var(--td);text-align:right;border-bottom:1px solid #222}
td{padding:10px 14px;font-size:12px;border-bottom:1px solid #1a1a1a;color:var(--t)}
tr:last-child td{border-bottom:none}
.bg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bgr{background:rgba(76,175,80,.15);color:#81C784}
.bgy{background:rgba(245,166,35,.15);color:var(--g)}
.bgx{background:rgba(229,57,53,.15);color:#EF9A9A}
.pg{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px;border-top:1px solid #222}
</style></head><body>
<div id="L"><div class="box">
<div style="font-size:44px;margin-bottom:6px">🍳</div>
<div class="ti">EGGS AND EGGS</div>
<div class="su">داشبورد التحليل والمحاسبة — Foodics</div>
<div style="text-align:right;font-size:12px;color:var(--td);margin-bottom:6px">API TOKEN — رمز الوصول</div>
<textarea id="tk" rows="4" placeholder="...الصق الرمز هنا"></textarea>
<button class="btn" id="lb" onclick="login()">دخول وعرض البيانات ←</button>
<div class="err" id="er"></div>
</div></div>
<div id="D">
<div class="top"><div class="tl">🍳 EGGS AND EGGS</div><button class="sm" onclick="logout()">خروج</button></div>
<div class="main">
<div class="db">
<div>
<div style="font-size:12px;color:var(--td);margin-bottom:6px">📅 فترة التقرير</div>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<button class="qb" onclick="sq('today',this)">اليوم</button>
<button class="qb" onclick="sq('yes',this)">أمس</button>
<button class="qb a" onclick="sq('week',this)">هذا الأسبوع</button>
<button class="qb" onclick="sq('month',this)">هذا الشهر</button>
<button class="qb" onclick="sq('30',this)">آخر 30 يوم</button>
</div></div>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
<input type="date" id="df"><span style="color:var(--td)">—</span>
<input type="date" id="dt">
<button class="gb" onclick="load(1)">↻</button>
</div></div>
<div id="ks"><div class="ld"><div class="sp"></div>جاري التحميل...</div></div>
<div id="os"><div class="ld"><div class="sp"></div></div></div>
</div></div>
<script>
const P='https://eggs-dashboard.vercel.app/api';
let T='',pg=1,tp=1;
function fmt(d){return d.toISOString().split('T')[0]}
async function api(ep,p={}){
const q=new URLSearchParams(p).toString();
const r=await fetch(`${P}?endpoint=${ep}${q?'&'+q:''}`,{headers:{'x-foodics-token':T,'Accept':'application/json'}});
if(!r.ok)throw new Error('خطأ '+r.status);
return r.json();
}
async function login(){
const t=document.getElementById('tk').value.trim();
if(!t){err('أدخل الرمز');return}
T=t;
const b=document.getElementById('lb');
b.disabled=true;b.textContent='جاري التحقق...';
try{
const d=await api('business');
if(d.message?.includes('Unauthenticated')||d.error)throw new Error('الرمز غير صحيح');
document.getElementById('L').style.display='none';
document.getElementById('D').style.display='block';
sq('week',document.querySelector('.qb.a'));
}catch(e){err(e.message);b.disabled=false;b.textContent='دخول وعرض البيانات ←'}
}
function err(m){const e=document.getElementById('er');e.textContent='❌ '+m;e.style.display='block'}
function logout(){T='';document.getElementById('L').style.display='flex';document.getElementById('D').style.display='none';document.getElementById('tk').value='';document.getElementById('er').style.display='none';document.getElementById('lb').disabled=false;document.getElementById('lb').textContent='دخول وعرض البيانات ←'}
function sq(p,el){
document.querySelectorAll('.qb').forEach(b=>b.classList.remove('a'));
if(el)el.classList.add('a');
const n=new Date();let f,t=fmt(n);
if(p==='today')f=fmt(n);
else if(p==='yes'){f=fmt(new Date(n-86400000));t=f}
else if(p==='week')f=fmt(new Date(n-6*86400000));
else if(p==='month')f=fmt(new Date(n.getFullYear(),n.getMonth(),1));
else if(p==='30')f=fmt(new Date(n-29*86400000));
document.getElementById('df').value=f;
document.getElementById('dt').value=t;
load(1);
}
async function load(p=1){
pg=p;
const f=document.getElementById('df').value,t=document.getElementById('dt').value;
document.getElementById('ks').innerHTML='<div class="ld"><div class="sp"></div>جاري التحميل...</div>';
document.getElementById('os').innerHTML='<div class="ld"><div class="sp"></div></div>';
try{
const d=await api('orders',{'filter[business_date][gte]':f,'filter[business_date][lte]':t,per_page:50,page:p,include:'branch'});
const o=d.data||[],m=d.meta||{};tp=m.last_page||1;
const tot=o.reduce((s,x)=>s+parseFloat(x.total_price||0),0);
const dis=o.reduce((s,x)=>s+parseFloat(x.discount_amount||0),0);
const tax=o.reduce((s,x)=>s+parseFloat(x.tax_amount||0),0);
const avg=o.length?tot/o.length:0;
const cl=o.filter(x=>x.status==='closed').length;
document.getElementById('ks').innerHTML=`<div class="kg">
<div class="kc"><div class="ki">💰</div><div class="kl">إجمالي المبيعات</div><div class="kv">${tot.toFixed(2)}</div><div class="ks">ريال</div></div>
<div class="kc"><div class="ki">🧾</div><div class="kl">عدد الطلبات</div><div class="kv">${o.length}</div><div class="ks">من ${m.total||'?'}</div></div>
<div class="kc"><div class="ki">📊</div><div class="kl">متوسط الطلب</div><div class="kv">${avg.toFixed(2)}</div><div class="ks">ريال</div></div>
<div class="kc"><div class="ki">✅</div><div class="kl">مغلقة</div><div class="kv">${cl}</div><div class="ks">من ${o.length}</div></div>
<div class="kc"><div class="ki">🏷️</div><div class="kl">الخصومات</div><div class="kv">${dis.toFixed(2)}</div><div class="ks">ريال</div></div>
<div class="kc"><div class="ki">🏛️</div><div class="kl">الضريبة</div><div class="kv">${tax.toFixed(2)}</div><div class="ks">ريال</div></div>
</div>`;
if(!o.length){document.getElementById('os').innerHTML='<div class="ld">لا توجد طلبات</div>';return}
const sm={closed:['مغلق','bgr'],open:['مفتوح','bgy'],void:['ملغي','bgx']};
const rows=o.map(x=>{const[l,c]=sm[x.status]||[x.status,'bgy'];return`<tr><td>${x.reference||(x.id||'').substring(0,8)||'—'}</td><td>${x.branch?.name||'—'}</td><td>${x.business_date||'—'}</td><td style="color:var(--g);font-weight:700">${parseFloat(x.total_price||0).toFixed(2)}</td><td>${parseFloat(x.discount_amount||0).toFixed(2)}</td><td>${parseFloat(x.tax_amount||0).toFixed(2)}</td><td><span class="bg ${c}">${l}</span></td></tr>`}).join('');
const pag=tp>1?`<div class="pg"><button class="sm" onclick="load(${p-1})" ${p<=1?'disabled':''}>→</button><span style="font-size:12px;color:var(--td)">${p}/${tp}</span><button class="sm" onclick="load(${p+1})" ${p>=tp?'disabled':''}>←</button></div>`:'';
document.getElementById('os').innerHTML=`<div class="tw"><table><thead><tr><th>رقم</th><th>الفرع</th><th>التاريخ</th><th>الإجمالي</th><th>الخصم</th><th>الضريبة</th><th>الحالة</th></tr></thead><tbody>${rows}</tbody></table>${pag}</div>`;
}catch(e){document.getElementById('ks').innerHTML='';document.getElementById('os').innerHTML=`<div class="ld" style="color:#ff6b6b">❌ ${e.message}</div>`}
}
const n=new Date();
document.getElementById('df').value=fmt(new Date(n-6*86400000));
document.getElementById('dt').value=fmt(n);
</script></body></html>
